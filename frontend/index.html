<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RashiBazar</title>
  <style>
    /* Completely Hide Google Translate top banner & body offset */
    .goog-te-banner-frame {
      display: none !important;
    }

    .goog-te-banner-frame.skiptranslate {
      display: none !important;
    }

    body {
      top: 0px !important;
      position: static !important;
    }

    /* Hide popup tooltips from Google Translate */
    #goog-gt-tt,
    .goog-te-balloon-frame {
      display: none !important;
    }

    .goog-text-highlight {
      background-color: transparent !important;
      box-shadow: none !important;
    }

    /* Hide Google Logo */
    .goog-logo-link {
      display: none !important;
    }

    /* Customize widget appearance for cosmic theme */
    .goog-te-gadget {
      color: transparent !important;
      font-family: 'Poppins', sans-serif;
      font-size: 0px !important;
    }

    .goog-te-gadget .goog-te-combo {
      color: #FBBF24 !important;
      /* yellow-400 */
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.8), rgba(88, 28, 135, 0.8)) !important;
      /* purple-900 */
      border: 1px solid rgba(168, 85, 247, 0.5) !important;
      border-radius: 9999px !important;
      padding: 6px 16px !important;
      font-size: 12px !important;
      font-weight: 700 !important;
      text-transform: uppercase;
      letter-spacing: 1px;
      outline: none !important;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      margin: 0 !important;
    }

    .goog-te-gadget .goog-te-combo:hover {
      border-color: #FBBF24 !important;
    }
  </style>
</head>

<body>
  <!-- Fixed Translator Widget for all pages -->
  <div
    style="position: fixed; bottom: 24px; left: 24px; z-index: 999999; display: flex; align-items: center; justify-content: center;">
    <div id="google_translate_element"></div>
  </div>

  <div id="root"></div>
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'en,ne',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE
      }, 'google_translate_element');
    }
  </script>
  <script type="text/javascript"
    src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  <script type="module" src="/src/main.jsx"></script>
</body>
